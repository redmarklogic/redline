# Configuration file for `prek`, a git hook framework written in Rust.
# See https://prek.j178.dev for more information.
#:schema https://www.schemastore.org/prek.json
#
# Priority groups (same priority = concurrent execution):
#   0  — instant blockers (language=fail, near-zero cost binary checks)
#  10  — fast read-only validators (25+ hooks run concurrently)
#  20  — formatters / fixers (mutate files; different tools touch different file types)
#  30  — post-format validators (read the formatted output)
#  40  — slow deep analysis (import graph, docstrings, deps)

default_install_hook_types = [
  "pre-commit",
  "pre-push",
  "post-checkout",
  "post-merge",
  "post-rewrite"
  ]
default_stages = [
  "pre-commit",
  "pre-push"
  ]

# ---------------------------------------------------------------------------
# Priority 0 — Instant blockers
# language=fail hooks cost nothing; file-existence checks are near-instant.
# Fail here before spending any CPU on validators or formatters.
# ---------------------------------------------------------------------------

[[repos]]
repo = "local"
hooks = [
  {
    id = "forbidden-copier-rej-files",
    name = "forbidden copier rej files",
    entry = "found Copier update rejection files; review them and remove them",
    language = "fail",
    files = '\.rej$',
    priority = 0
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "forbidden-testpy-files",
    name = "forbidden testpy files",
    entry = "found test.py file inside tests directory; rename or remove them",
    language = "fail",
    files = "((./tests/.*/test.py)|(./tests/test.py))$",
    priority = 0
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "forbidden-ipynb-files",
    name = "forbidden ipynb files",
    entry = "found .ipynb notebook file; AGENTS.md forbids notebook creation; remove it",
    language = "fail",
    files = '\.ipynb$',
    priority = 0
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "forbidden-copilot-instructions-file",
    name = "forbidden .github/copilot-instructions.md",
    entry = ".github/copilot-instructions.md must not exist. Per ADR-012, AGENTS.md is the single canonical instruction file for all AI agents. Put agent instructions in AGENTS.md, not in .github/copilot-instructions.md.",
    language = "fail",
    files = '\.github/copilot-instructions\.md$',
    priority = 0
  }
]

[[repos]]
repo = "https://github.com/pre-commit/pre-commit-hooks"
rev = "v6.0.0"
hooks = [
  {
    id = "check-added-large-files",
    args = ["--maxkb=100000"],
    priority = 0
  },
  {
    id = "check-merge-conflict",
    args = ["--assume-in-merge"],
    priority = 0
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "check-extension-residue",
    name = "check-extension-residue",
    entry = "uv run --frozen --offline hooks/check-extension-residue.py",
    language = "system",
    always_run = true,
    pass_filenames = false,
    priority = 0
  }
]

# ---------------------------------------------------------------------------
# Priority 10 — Fast read-only validators
# All run concurrently. No file mutations. uv-lock is here because it
# validates/regenerates the lock file and does not read .py source files.
# ---------------------------------------------------------------------------

[[repos]]
repo = "https://github.com/abravalheri/validate-pyproject"
rev = "v0.24.1"
hooks = [
  {
    id = "validate-pyproject",
    priority = 10
  }
]

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.9.9"
hooks = [
  {
    id = "uv-lock",
    priority = 10
  }
]

[[repos]]
repo = "https://github.com/python-formate/flake8-dunder-all"
rev = "v0.5.0"
hooks = [
  # Runs after ruff-check (priority=20) could have altered __init__.py.
  # Kept here at 10 — dunder-all checks structure, not style; ruff rarely
  # touches __all__. Move to 30 if false positives appear.
  {
    id = "ensure-dunder-all",
    files = '.*/__init__\.py$',
    exclude = "tests/assets/",
    priority = 10
  }
]

[[repos]]
repo = "https://github.com/pre-commit/pygrep-hooks"
rev = "v1.10.0"
hooks = [
  {
    id = "rst-backticks",
    priority = 10
  }
]

[[repos]]
repo = "https://github.com/Yelp/detect-secrets"
rev = "v1.5.0"
hooks = [
  {
    id = "detect-secrets",
    args = [
      "--baseline",
      ".config/secrets.baseline"
    ],
    exclude = "tests/assets/html/|\\.config/secrets\\.baseline",
    priority = 10
  }
]

