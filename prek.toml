[[repos]]
repo = "local"
hooks = [
  {
    id = "cce-reindex",
    name = "cce-reindex",
    entry = "cce index",
    language = "system",
    stages = ["post-checkout", "post-merge"],
    always_run = true,
    pass_filenames = false,
    priority = 10
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "check-deferred-overdue",
    name = "check-deferred-overdue",
    entry = "uv run --frozen --offline hooks/check-deferred-overdue.py",
    args = ["--deferred-dir=docs/deferred"],
    language = "system",
    stages = ["pre-push"],
    pass_filenames = false,
    priority = 10
  }
]

# ---------------------------------------------------------------------------
# Priority 20 — Formatters / fixers
# Mutate files. Run concurrently because each tool owns a distinct file type:
#   ruff-check  → .py files
#   pyproject-fmt → pyproject.toml
#   fix-doc-sync  → AGENTS.md
# ---------------------------------------------------------------------------

[[repos]]
repo = "https://github.com/astral-sh/ruff-pre-commit"
rev = "v0.15.14"
hooks = [
  {
    id = "ruff-check",
    args = [
      "--fix",
      "--ignore",
      "FIX",
      "--unsafe-fixes"
    ],
    priority = 20
  },
  {
    id = "ruff-format",
    priority = 30
  }
]

[[repos]]
repo = "local"
hooks = [
  {
    id = "pyproject-fmt",
    name = "pyproject-fmt",
    language = "system",
    entry = "uvx --python 3.14 --from 'pyproject-fmt==2.15.3' --with 'toml-fmt-common<1.1.0' pyproject-fmt",
    files = '^pyproject\.toml$',
    priority = 20
  },
  {
    id = "fix-doc-sync",
    name = "fix-doc-sync",
    entry = "uv run --frozen --offline hooks/fix-doc-sync.py",
    args = ["AGENTS.md"],
    language = "system",
    always_run = true,
    pass_filenames = false,
    priority = 20
  }
]

# ---------------------------------------------------------------------------
# Priority 30 — Post-format validators
# Read the output of priority-20 formatters. ruff-format reads the .py files
# that ruff-check --fix has already written. uv-sync/uv-export consume the
# lock file that uv-lock (priority=10) has already updated.
# ---------------------------------------------------------------------------

[[repos]]
repo = "https://github.com/astral-sh/uv-pre-commit"
rev = "0.9.9"
hooks = [
  {
    id = "uv-sync",
    priority = 30
  },
  {
    id = "uv-export",
    args = ["--quiet"],
    priority = 30
  }
]

# ---------------------------------------------------------------------------
# Priority 40 — Slow deep analysis
# Import graph, docstring coverage, dependency audit, spell-check.
# All run concurrently; each is I/O- or parse-heavy and independent.
# ---------------------------------------------------------------------------

[[repos]]
repo = "local"
hooks = [
  {
    id = "pydoclint",
    name = "pydoclint",
    entry = "uv run --frozen --offline pydoclint",
    args = ["src"],
    language = "system",
    files = '^src/.*\.py$',
    pass_filenames = false,
    priority = 40
  },
  {
    id = "deptry",
    name = "deptry",
    entry = "uv run --frozen --offline deptry src",
    language = "system",
    files = '^src/.*\.py$|^pyproject\.toml$',
    pass_filenames = false,
    priority = 40
  },
  {
    id = "import-linter",
    name = "import-linter",
    entry = "uv run --frozen --offline lint-imports",
    language = "system",
    files = '^src/.*\.py$|^pyproject\.toml$',
    pass_filenames = false,
    priority = 40
  }
]

[[repos]]
repo = "https://github.com/codespell-project/codespell"
rev = "v2.4.2"
hooks = [
  {
    id = "codespell",
    additional_dependencies = ["tomli"],
    priority = 40
  }
]
