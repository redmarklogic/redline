name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    # Run when @claude is mentioned in a PR comment, OR when review is requested from the ai-review team
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request' &&
       github.event.requested_team.slug == 'ai-review')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            Review this pull request. Focus on:
            - Correctness bugs and logic errors
            - Security vulnerabilities
            - Code quality and maintainability issues

            Post inline comments on specific lines where you find issues.
            Summarize findings in a top-level PR review comment.
