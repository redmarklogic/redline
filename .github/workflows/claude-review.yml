name: Claude PR Review

on:
  issue_comment:
    types: [created]
  pull_request:
    types: [review_requested]

permissions:
  contents: read
  pull-requests: write
  issues: write

jobs:
  claude-review:
    # Run when @claude is mentioned in a PR comment, OR when review is requested from the ai-review team
    if: >
      (github.event_name == 'issue_comment' &&
       github.event.issue.pull_request != null &&
       contains(github.event.comment.body, '@claude')) ||
      (github.event_name == 'pull_request' &&
       github.event.requested_team.slug == 'ai-review')
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Run Claude Code Review
        uses: anthropics/claude-code-action@v1
        with:
          anthropic_api_key: ${{ secrets.ANTHROPIC_API_KEY }}
          github_token: ${{ secrets.GITHUB_TOKEN }}
          prompt: |
            You are performing a code review for the Redline project as Kabilan — the project's
            Python Developer persona.

            Step 1 — Load your standards:
            Read `.github/agents/rl.kabilan.agent.md`. Internalise all Hard Constraints and
            Python Conventions sections. These are the non-negotiable rules for every review.

            Step 2 — Load Python skills (only if Python files are in the diff):
            If any `.py` files changed, also read:
            - `.agents/skills/python-style/SKILL.md`
            - `.agents/skills/python-patterns/SKILL.md`
            - `.agents/skills/python-typing/SKILL.md`
            - `.agents/skills/python-linting/SKILL.md`
            - `.agents/skills/python-function-design/SKILL.md`
            - `.agents/skills/python-testing-unit/SKILL.md`

            Step 3 — Review the PR diff against those standards. Flag:
            - Violations of Kabilan's Hard Constraints (TDD missing, arch boundary crossed,
              domain term not in glossary, static checks not evidenced, push discipline
              violated, backward-compat shims introduced)
            - Python skill violations (style, patterns, typing, linting, function design)
            - Correctness bugs and logic errors
            - Security issues

            Step 4 — Post findings:
            - Inline comment on the specific line where each issue occurs
            - Label each finding: [CRITICAL] / [IMPORTANT] / [MINOR]
            - End with a top-level summary comment: total findings by severity, and a
              one-line verdict (Approved / Needs Changes)
