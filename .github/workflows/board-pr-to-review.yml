name: Board — PR ready for review sets To Review
# Fires when a non-draft PR is opened, reopened, or converted from draft to ready.
# Extracts the issue number from the branch name (feature/<N>-description) and moves
# that issue's Status field to "To Review" on the GitHub Projects board via GraphQL.

on:
  pull_request:
    types: [opened, reopened, ready_for_review]

jobs:
  set-to-review:
    name: Move linked issues to To Review
    if: ${{ !github.event.pull_request.draft }}
    runs-on: ubuntu-latest
    permissions:
      pull-requests: read

    steps:
      - name: Move linked issues to To Review
        env:
          GH_TOKEN: ${{ secrets.PROJECT_TOKEN }}
          PR_HEAD_REF: ${{ github.event.pull_request.head.ref }}
          PR_URL: ${{ github.event.pull_request.html_url }}
        run: |
          PROJECT_ID="PVT_kwDOEUOu2c4BZrkB"
          STATUS_FIELD_ID="PVTSSF_lADOEUOu2c4BZrkBzhUojY8"
          TO_REVIEW_OPT="3ced9463"

          # Extract issue number from branch name (e.g. feature/64-some-description)
          ISSUES=$(echo "$PR_HEAD_REF" | grep -oE '^(feature|fix|chore|refactor|docs)/([0-9]+)-' | grep -oE '[0-9]+' || true)

          if [ -z "$ISSUES" ]; then
            echo "No issue number found in branch name: $PR_HEAD_REF"
            exit 0
          fi

          echo "Branch $PR_HEAD_REF -> issue(s): $ISSUES"

          for ISSUE_NUM in $ISSUES; do
            echo "Processing issue #$ISSUE_NUM..."

            # Get project item ID for this issue
            ITEM_ID=$(gh api graphql -f query="
            query {
              repository(owner: \"redmarklogic\", name: \"redline\") {
                issue(number: $ISSUE_NUM) {
                  projectItems(first: 5) {
                    nodes {
                      id
                      project { id }
                    }
                  }
                }
              }
            }" --jq ".data.repository.issue.projectItems.nodes[] | select(.project.id == \"$PROJECT_ID\") | .id" 2>/dev/null || true)

            if [ -z "$ITEM_ID" ]; then
              echo "  Issue #$ISSUE_NUM not on the Redline board — skipping."
              continue
            fi

            # Set status to To Review
            gh api graphql -f query="
            mutation {
              updateProjectV2ItemFieldValue(input: {
                projectId: \"$PROJECT_ID\"
                itemId: \"$ITEM_ID\"
                fieldId: \"$STATUS_FIELD_ID\"
                value: { singleSelectOptionId: \"$TO_REVIEW_OPT\" }
              }) { projectV2Item { id } }
            }" > /dev/null

            echo "  Issue #$ISSUE_NUM -> To Review"
          done
