name: "Copilot Setup Steps"
permissions: {}
on:
    workflow_dispatch:
    push:
        paths:
            - .github/workflows/copilot-setup-steps.yml
    pull_request:
        paths:
            - .github/workflows/copilot-setup-steps.yml
jobs:
    copilot-setup-steps:
        runs-on: ubuntu-latest
        permissions:
            contents: read # Required to checkout for the uv lockfile
        steps:
            - name: Checkout code
              uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
              with:
                  persist-credentials: false

            - name: Set up uv
              uses: astral-sh/setup-uv@37802adc94f370d6bfd71619e3f0bf239e1f3b78 # v7.6.0
              with:
                  version: latest
                  activate-environment: true

            - name: Set up Node.js
              uses: actions/setup-node@53b83947a5a98c8d113130e565377fae1a50d02f # v6.3.0
              with:
                  cache: "npm"
                  cache-dependency-path: ".github/workflows/copilot-setup-steps.yml"

            - name: Install external agent skills
              env:
                  GIT_CONFIG_COUNT: "1"
                  GIT_CONFIG_KEY_0: core.autocrlf
                  GIT_CONFIG_VALUE_0: "false"
              run: |
                  npx skills experimental_install || true
                  if ! git diff --exit-code --quiet; then
                      echo "::warning::skills-lock.json is out of date. Removing installed skills and reverting changes."
                      rm -rf .agents/skills
                      git checkout .
                  fi      

            - name: Setup dependencies
              run: uv sync

            - name: Install prek hooks
              run: uv run prek install
