services:
  marker:
    build:
      context: .
      dockerfile: deploy/docker/marker/Dockerfile
    platform: linux/amd64
    ports:
      - "${MARKER_PORT:-8000}:8000"
    environment:
      - APP_ENV=${APP_ENV:-development}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"]
      interval: 10s
      timeout: 3s
      retries: 3
      start_period: 15s
